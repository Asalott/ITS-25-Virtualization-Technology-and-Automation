<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Dashboard</title>

<style>
:root {
    --sage: #9caf88;
    --sage-dark: #7e946d;
    --bg: #f4f7f3;
    --card: rgba(255,255,255,0.6);
    --text: #1d1d1f;
    --subtle: #6e6e73;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    background: linear-gradient(180deg, #eef3ec, #f8faf7);
    color: var(--text);
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.5);
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

nav h1 {
    font-weight: 600;
}

#clock {
    color: var(--subtle);
}

/* CONTAINER */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 60px 30px;
}

h2 {
    font-size: 2rem;
    margin-bottom: 30px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    background: var(--card);
    backdrop-filter: blur(25px);
    border-radius: 20px;
    padding: 25px;
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: all 0.25s ease;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

/* STATUS */
.status {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

.dot {
    width: 10px;
    height: 10px;
    background: var(--sage);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--sage);
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 10px 18px;
    border-radius: 25px;
    border: none;
    background: var(--sage);
    color: white;
    font-size: 0.9rem;
    cursor: pointer;
    transition: 0.25s;
}

.btn:hover {
    background: var(--sage-dark);
    transform: scale(1.05);
}

/* TERMINAL */
.terminal {
    background: #1f1f1f;
    color: #d1ffd6;
    padding: 15px;
    border-radius: 15px;
    font-family: monospace;
    margin-top: 10px;
}

/* FOOTER */
footer {
    margin-top: 60px;
    padding: 30px;
    text-align: center;
    color: var(--subtle);
    font-size: 0.9rem;
}

/* FLOATING ANIMATION */
.card {
    animation: floatIn 0.8s ease forwards;
}

@keyframes floatIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<nav>
    <h1>🌿Server</h1>
    <span id="clock"></span>
</nav>

<div class="container">
    <h2>Overview</h2>

    <div class="grid">

        <div class="card">
            <h3>Web Server</h3>
            <div class="status">
                <div class="dot"></div>
                <span>Running smoothly</span>
            </div>
            <button class="btn" onclick="notify()">Check status</button>
        </div>

        <div class="card">
            <h3>System</h3>
            <p id="system"></p>
        </div>

        <div class="card">
            <h3>Uptime</h3>
            <p id="uptime"></p>
        </div>

        <div class="card">
            <h3>Console</h3>
            <div class="terminal">
                <p>$ status</p>
                <p>✔ server healthy</p>
            </div>
        </div>

    </div>
</div>

<footer>
    Designed with a calm, natural interface · 2026
</footer>

<script>
// CLOCK
function updateClock() {
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// SYSTEM INFO
document.getElementById("system").innerText =
    navigator.platform;

// UPTIME
let sec = 0;
setInterval(() => {
    sec++;
    document.getElementById("uptime").innerText =
        sec + " seconds";
}, 1000);

// BUTTON
function notify() {
    alert("Server is running perfectly 🌿");
}
</script>

</body>
</html>
