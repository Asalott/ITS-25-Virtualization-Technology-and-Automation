<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Bash — Complete Command Reference</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=Barlow+Condensed:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2eb;
  --bg2: #ece8df;
  --ink: #1a1714;
  --ink2: #4a4540;
  --ink3: #7a7268;
  --rule: #d4cfc6;
  --accent: #c8421a;
  --accent2: #2a6b3c;
  --accent3: #1a4a8a;
  --accent4: #7a2a8a;
  --accent5: #c87a1a;
  --code-bg: #1a1714;
  --code-fg: #e8e2d8;
  --tag-r: rgba(200,66,26,0.12);
  --tag-g: rgba(42,107,60,0.12);
  --tag-b: rgba(26,74,138,0.12);
  --tag-p: rgba(122,42,138,0.12);
  --tag-o: rgba(200,122,26,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  color: var(--bg);
  padding: 0;
  position: relative;
  overflow: hidden;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 40px 40px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: end;
}
.header-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
h1 {
  font-size: clamp(56px, 10vw, 120px);
  font-weight: 900;
  line-height: 0.88;
  letter-spacing: -3px;
  text-transform: uppercase;
}
h1 span { color: var(--accent); }
.header-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: rgba(245,242,235,0.45);
  margin-top: 16px;
  letter-spacing: 0.5px;
  line-height: 1.7;
}
.header-count {
  text-align: right;
  font-family: 'IBM Plex Mono', monospace;
}
.header-count .num {
  font-size: 64px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  display: block;
}
.header-count .lbl {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(245,242,235,0.4);
}
.header-stripe {
  height: 4px;
  background: repeating-linear-gradient(90deg, var(--accent) 0px, var(--accent) 24px, transparent 24px, transparent 32px);
}

/* ── TOOLBAR ── */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--ink);
  border-bottom: 1px solid rgba(245,242,235,0.1);
  padding: 0 40px;
}
.toolbar-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 0;
  align-items: stretch;
  overflow-x: auto;
  scrollbar-width: none;
}
.toolbar-inner::-webkit-scrollbar { display: none; }
.tb-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(245,242,235,0.4);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 14px 16px;
  cursor: pointer;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.tb-btn:hover { color: var(--bg); }
.tb-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── SEARCH ── */
.search-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--rule);
  padding: 16px 40px;
  position: sticky;
  top: 49px;
  z-index: 99;
}
.search-bar-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 12px;
  align-items: center;
}
.search-wrap {
  position: relative;
  flex: 1;
  max-width: 480px;
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--ink3);
  pointer-events: none;
}
#search {
  width: 100%;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 10px 14px 10px 38px;
  color: var(--ink);
  outline: none;
  transition: border-color .2s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--ink3); }
.result-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--ink3);
  white-space: nowrap;
}

/* ── MAIN ── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px 80px;
}

/* ── SECTION ── */
.cmd-section {
  margin-top: 56px;
  transition: opacity .3s;
}
.cmd-section.hidden { display: none; }

.section-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 0;
}
.section-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--ink3);
  letter-spacing: 2px;
}
.section-title {
  font-size: 32px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: -0.5px;
  flex: 1;
}
.section-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--ink3);
}

/* ── CMD GRID ── */
.cmd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
  margin-top: 1px;
}

.cmd-card {
  background: var(--bg);
  padding: 20px 22px;
  transition: background .15s;
  position: relative;
}
.cmd-card:hover { background: var(--bg2); }
.cmd-card.hidden { display: none; }

.cmd-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}
.cmd-code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.4;
  word-break: break-all;
}
.cmd-code .git-kw { color: var(--accent); }
.cmd-code .cmd-kw { color: var(--accent3); }
.cmd-code .arg { color: var(--accent2); }
.cmd-code .flag { color: var(--accent4); }
.cmd-code .val { color: var(--accent5); }

.copy-btn {
  flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--rule);
  border-radius: 2px;
  color: var(--ink3);
  padding: 3px 8px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.ok { border-color: var(--accent2); color: var(--accent2); }

.cmd-desc {
  font-size: 14px;
  font-weight: 300;
  color: var(--ink2);
  line-height: 1.55;
  margin-bottom: 10px;
}

.cmd-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
  padding: 2px 7px;
  border-radius: 2px;
  text-transform: uppercase;
}
.tag-r { background: var(--tag-r); color: var(--accent); }
.tag-g { background: var(--tag-g); color: var(--accent2); }
.tag-b { background: var(--tag-b); color: var(--accent3); }
.tag-p { background: var(--tag-p); color: var(--accent4); }
.tag-o { background: var(--tag-o); color: var(--accent5); }

/* ── NO RESULTS ── */
#noResults {
  display: none;
  text-align: center;
  padding: 80px 20px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--ink3);
}
#noResults .nr-big { font-size: 48px; margin-bottom: 16px; }
#noResults .nr-text { font-size: 13px; }

/* ── BACK TO TOP ── */
.btt {
  position: fixed;
  bottom: 28px; right: 28px;
  width: 44px; height: 44px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 3px;
  font-size: 18px;
  cursor: pointer;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .3s, transform .3s;
  z-index: 200;
}
.btt.show { opacity: 1; transform: translateY(0); }
.btt:hover { background: var(--accent); }

/* ── PROGRESS ── */
.progress {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  background: var(--accent);
  z-index: 300;
  width: 0%;
  transition: width .1s;
}

/* ── FOOTER ── */
footer {
  background: var(--ink);
  color: rgba(245,242,235,0.3);
  text-align: center;
  padding: 28px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
}

@media(max-width:700px){
  .header-inner { grid-template-columns: 1fr; }
  .header-count { text-align: left; }
  .toolbar, .search-bar { padding-left: 16px; padding-right: 16px; }
  .main { padding: 0 16px 60px; }
  .cmd-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="progress" id="prog"></div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div>
      <div class="header-eyebrow">Windows Git Bash · Complete Reference</div>
      <h1>Git<br><span>Commands</span></h1>
      <div class="header-sub">
        Every command available in Git Bash on Windows.<br>
        Search, filter by category, copy with one click.
      </div>
    </div>
    <div class="header-count">
      <span class="num" id="totalCount">0</span>
      <span class="lbl">commands</span>
    </div>
  </div>
  <div class="header-stripe"></div>
</header>

<!-- TOOLBAR -->
<nav class="toolbar">
  <div class="toolbar-inner" id="toolbar">
    <button class="tb-btn active" onclick="filterSection(this,'all')">All</button>
    <button class="tb-btn" onclick="filterSection(this,'setup')">Setup</button>
    <button class="tb-btn" onclick="filterSection(this,'init')">Init & Clone</button>
    <button class="tb-btn" onclick="filterSection(this,'stage')">Stage & Snapshot</button>
    <button class="tb-btn" onclick="filterSection(this,'branch')">Branch & Merge</button>
    <button class="tb-btn" onclick="filterSection(this,'remote')">Remote</button>
    <button class="tb-btn" onclick="filterSection(this,'inspect')">Inspect & Log</button>
    <button class="tb-btn" onclick="filterSection(this,'undo')">Undo & Reset</button>
    <button class="tb-btn" onclick="filterSection(this,'rebase')">Rebase & Cherry-pick</button>
    <button class="tb-btn" onclick="filterSection(this,'stash')">Stash</button>
    <button class="tb-btn" onclick="filterSection(this,'tag')">Tags</button>
    <button class="tb-btn" onclick="filterSection(this,'submodule')">Submodules</button>
    <button class="tb-btn" onclick="filterSection(this,'advanced')">Advanced</button>
    <button class="tb-btn" onclick="filterSection(this,'bash')">Bash Extras</button>
  </div>
</nav>

<!-- SEARCH -->
<div class="search-bar">
  <div class="search-bar-inner">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" type="text" placeholder="Search commands, flags, descriptions..." oninput="doSearch()">
    </div>
    <span class="result-count" id="resCnt"></span>
  </div>
</div>

<!-- MAIN -->
<main class="main" id="main"></main>
<div id="noResults">
  <div class="nr-big">∅</div>
  <div class="nr-text">No commands match your search.</div>
</div>

<button class="btt" id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<footer>GIT BASH COMMAND REFERENCE &nbsp;·&nbsp; git-scm.com &nbsp;·&nbsp; All commands valid in Git for Windows (Git Bash)</footer>

<script>
const sections = [
  {
    id: 'setup',
    title: 'Setup & Configuration',
    cmds: [
      { code: 'git config --global user.name "Your Name"', desc: 'Set the name that will be attached to all your commits globally.', tags: ['config','global'] },
      { code: 'git config --global user.email "you@example.com"', desc: 'Set the email address attached to all commits globally.', tags: ['config','global'] },
      { code: 'git config --global core.editor "code --wait"', desc: 'Set VS Code as the default commit message editor. Replace with notepad, vim, nano, etc.', tags: ['config','editor'] },
      { code: 'git config --global core.autocrlf true', desc: 'Auto-convert LF to CRLF on checkout (recommended for Windows).', tags: ['config','windows'] },
      { code: 'git config --global core.autocrlf input', desc: 'Convert CRLF to LF on commit but not on checkout (for cross-platform repos).', tags: ['config','windows'] },
      { code: 'git config --global init.defaultBranch main', desc: 'Set the default branch name for new repositories to "main" instead of "master".', tags: ['config','global'] },
      { code: 'git config --list', desc: 'List all configuration settings currently active (merged global + local).', tags: ['config','read'] },
      { code: 'git config --list --show-origin', desc: 'List all settings with the file they come from.', tags: ['config','read'] },
      { code: 'git config --global --edit', desc: 'Open the global .gitconfig file in the configured editor.', tags: ['config','edit'] },
      { code: 'git config --local user.email "work@company.com"', desc: 'Override global email for just this repository.', tags: ['config','local'] },
      { code: 'git config --global alias.st status', desc: 'Create a short alias: git st → git status.', tags: ['config','alias'] },
      { code: 'git config --global alias.lg "log --oneline --graph --all"', desc: 'Create a pretty graph log alias: git lg.', tags: ['config','alias'] },
      { code: 'git config --global credential.helper manager', desc: 'Use Git Credential Manager (bundled with Git for Windows) to store credentials.', tags: ['config','auth'] },
      { code: 'git config --global http.proxy http://proxy:8080', desc: 'Set an HTTP proxy for Git (corporate networks).', tags: ['config','network'] },
      { code: 'git config --unset http.proxy', desc: 'Remove a specific configuration key.', tags: ['config','edit'] },
      { code: 'git config --global color.ui auto', desc: 'Enable coloured terminal output automatically.', tags: ['config','ui'] },
      { code: 'git help config', desc: 'Open the full git-config manual page in the browser.', tags: ['help'] },
    ]
  },
  {
    id: 'init',
    title: 'Init & Clone',
    cmds: [
      { code: 'git init', desc: 'Initialise a new Git repository in the current directory, creating a hidden .git folder.', tags: ['init'] },
      { code: 'git init my-project', desc: 'Create a new directory called my-project and initialise a repository inside it.', tags: ['init'] },
      { code: 'git init --bare repo.git', desc: 'Create a bare repository (no working tree) — used for shared/central repos.', tags: ['init','server'] },
      { code: 'git clone https://github.com/user/repo.git', desc: 'Clone a remote repository into a new directory named after the repo.', tags: ['clone','remote'] },
      { code: 'git clone https://github.com/user/repo.git my-dir', desc: 'Clone into a specific directory name.', tags: ['clone','remote'] },
      { code: 'git clone --depth 1 https://github.com/user/repo.git', desc: 'Shallow clone — only the latest commit, faster for large repos.', tags: ['clone','remote','shallow'] },
      { code: 'git clone --branch develop https://github.com/user/repo.git', desc: 'Clone and immediately check out a specific branch.', tags: ['clone','remote','branch'] },
      { code: 'git clone --recurse-submodules https://github.com/user/repo.git', desc: 'Clone and initialise all submodules automatically.', tags: ['clone','submodule'] },
      { code: 'git clone git@github.com:user/repo.git', desc: 'Clone using SSH instead of HTTPS.', tags: ['clone','ssh'] },
    ]
  },
  {
    id: 'stage',
    title: 'Stage & Snapshot',
    cmds: [
      { code: 'git status', desc: 'Show the working tree status — which files are modified, staged, or untracked.', tags: ['status','daily'] },
      { code: 'git status -s', desc: 'Short/compact status output (two-letter codes per file).', tags: ['status'] },
      { code: 'git add file.txt', desc: 'Stage a specific file, adding it to the index ready to commit.', tags: ['stage','daily'] },
      { code: 'git add .', desc: 'Stage all changes in the current directory and subdirectories.', tags: ['stage','daily'] },
      { code: 'git add -A', desc: 'Stage all changes (new, modified, deleted) across the entire working tree.', tags: ['stage'] },
      { code: 'git add -p', desc: 'Interactively choose which hunks (parts) of files to stage — great for splitting commits.', tags: ['stage','interactive'] },
      { code: 'git add -u', desc: 'Stage all tracked files that have been modified or deleted (not new files).', tags: ['stage'] },
      { code: 'git add *.js', desc: 'Stage all .js files in the current directory using a glob pattern.', tags: ['stage','glob'] },
      { code: 'git restore --staged file.txt', desc: 'Unstage a file without losing your changes (opposite of git add).', tags: ['stage','undo'] },
      { code: 'git restore file.txt', desc: 'Discard working directory changes to a file (dangerous — changes are lost).', tags: ['undo','discard'] },
      { code: 'git commit -m "Your message"', desc: 'Create a commit with a message inline — the most common workflow.', tags: ['commit','daily'] },
      { code: 'git commit', desc: 'Open the configured editor to write a multi-line commit message.', tags: ['commit'] },
      { code: 'git commit -am "message"', desc: 'Stage all tracked modified files and commit in one command (skips new/untracked files).', tags: ['commit','daily'] },
      { code: 'git commit --amend', desc: 'Modify the last commit — opens editor to change the message, or includes new staged changes.', tags: ['commit','undo'] },
      { code: 'git commit --amend --no-edit', desc: 'Amend last commit but keep the existing message unchanged.', tags: ['commit','undo'] },
      { code: 'git commit --amend -m "New message"', desc: 'Change only the last commit message inline.', tags: ['commit','undo'] },
      { code: 'git commit --allow-empty -m "CI trigger"', desc: 'Create a commit with no file changes (useful to trigger CI pipelines).', tags: ['commit','advanced'] },
      { code: 'git diff', desc: 'Show unstaged changes — what differs between working directory and index.', tags: ['diff','inspect'] },
      { code: 'git diff --staged', desc: 'Show staged changes — what differs between index and last commit.', tags: ['diff','inspect'] },
      { code: 'git diff HEAD', desc: 'Show all changes (staged + unstaged) since the last commit.', tags: ['diff','inspect'] },
      { code: 'git diff branch1..branch2', desc: 'Show differences between two branches.', tags: ['diff','branch'] },
      { code: 'git diff --stat', desc: 'Show a summary of changed files and line counts rather than full diff.', tags: ['diff','inspect'] },
      { code: 'git rm file.txt', desc: 'Remove a file from both the working directory and the index (stages the deletion).', tags: ['remove'] },
      { code: 'git rm --cached file.txt', desc: 'Remove a file from Git tracking only, keeping it on disk — useful to add to .gitignore.', tags: ['remove','gitignore'] },
      { code: 'git mv old.txt new.txt', desc: 'Rename or move a file and stage the change.', tags: ['rename'] },
    ]
  },
  {
    id: 'branch',
    title: 'Branch & Merge',
    cmds: [
      { code: 'git branch', desc: 'List all local branches. Current branch is marked with *.', tags: ['branch'] },
      { code: 'git branch -a', desc: 'List all local and remote-tracking branches.', tags: ['branch','remote'] },
      { code: 'git branch -v', desc: 'List branches with their last commit hash and message.', tags: ['branch','inspect'] },
      { code: 'git branch feature/login', desc: 'Create a new branch called feature/login at the current HEAD.', tags: ['branch','create'] },
      { code: 'git branch feature/login main', desc: 'Create a new branch starting at main (instead of current HEAD).', tags: ['branch','create'] },
      { code: 'git branch -d feature/login', desc: 'Delete a branch (safe — refuses if branch has unmerged changes).', tags: ['branch','delete'] },
      { code: 'git branch -D feature/login', desc: 'Force-delete a branch even if it has unmerged changes.', tags: ['branch','delete','force'] },
      { code: 'git branch -m old-name new-name', desc: 'Rename a branch.', tags: ['branch','rename'] },
      { code: 'git switch feature/login', desc: 'Switch to an existing branch (modern alternative to git checkout).', tags: ['branch','switch','daily'] },
      { code: 'git switch -c feature/new', desc: 'Create and switch to a new branch in one command.', tags: ['branch','create','daily'] },
      { code: 'git switch -c feature/new origin/feature/new', desc: 'Create a local branch tracking a remote branch and switch to it.', tags: ['branch','remote','tracking'] },
      { code: 'git checkout feature/login', desc: 'Switch to a branch (classic syntax, still widely used).', tags: ['branch','switch'] },
      { code: 'git checkout -b feature/new', desc: 'Create and switch to a new branch (classic syntax).', tags: ['branch','create'] },
      { code: 'git checkout -b fix origin/fix', desc: 'Create a local branch from a remote branch and track it.', tags: ['branch','remote'] },
      { code: 'git checkout --', desc: 'Discard all unstaged changes in the working directory.', tags: ['undo'] },
      { code: 'git merge feature/login', desc: 'Merge the specified branch into the current branch.', tags: ['merge','daily'] },
      { code: 'git merge --no-ff feature/login', desc: 'Merge with a merge commit even if fast-forward is possible — preserves branch history.', tags: ['merge'] },
      { code: 'git merge --squash feature/login', desc: 'Squash all branch commits into one staged change, then commit manually.', tags: ['merge','squash'] },
      { code: 'git merge --abort', desc: 'Abort an in-progress merge and restore pre-merge state.', tags: ['merge','undo'] },
      { code: 'git merge -s ours feature/login', desc: 'Merge but ignore all changes from the other branch (keep ours).', tags: ['merge','strategy'] },
      { code: 'git mergetool', desc: 'Open the configured merge conflict resolution tool.', tags: ['merge','conflict'] },
    ]
  },
  {
    id: 'remote',
    title: 'Remote Repositories',
    cmds: [
      { code: 'git remote -v', desc: 'List all remotes with their fetch/push URLs.', tags: ['remote','inspect'] },
      { code: 'git remote add origin https://github.com/user/repo.git', desc: 'Add a remote named "origin" pointing to a URL.', tags: ['remote','add'] },
      { code: 'git remote add upstream https://github.com/original/repo.git', desc: 'Add an upstream remote (common fork workflow).', tags: ['remote','add'] },
      { code: 'git remote rename origin new-name', desc: 'Rename an existing remote.', tags: ['remote'] },
      { code: 'git remote remove origin', desc: 'Remove a remote entirely.', tags: ['remote','delete'] },
      { code: 'git remote set-url origin https://new-url.git', desc: 'Change the URL of an existing remote.', tags: ['remote','edit'] },
      { code: 'git remote show origin', desc: 'Show detailed info about a remote — tracked branches, fetch/push URLs.', tags: ['remote','inspect'] },
      { code: 'git remote prune origin', desc: 'Delete remote-tracking refs that no longer exist on the remote.', tags: ['remote','clean'] },
      { code: 'git fetch', desc: 'Download all new data from all remotes without merging.', tags: ['remote','fetch','daily'] },
      { code: 'git fetch origin', desc: 'Fetch from the specific "origin" remote.', tags: ['remote','fetch'] },

// ── Render ──
let activeSection = 'all';

function highlight(text) {
  const parts = text.split(' ');
  return parts.map((p, i) => {
    if (i === 0 && p === 'git') return `<span class="git-kw">git</span>`;
    if (i === 1 && p.match(/^[a-z\-]+$/)) return `<span class="cmd-kw">${p}</span>`;
    if (p.startsWith('--') || p.startsWith('-')) return `<span class="flag">${p}</span>`;
    if (p.match(/^(HEAD|HEAD~\d+|main|master|origin|feature\/\w+|abc\d+|def\d+)$/)) return `<span class="arg">${p}</span>`;
    if (p.match(/^".*"$/) || p.match(/^'.*'$/)) return `<span class="val">${p}</span>`;
    return p;
  }).join(' ');
}

function tagClass(t) {
  const map = { config:'b', global:'b', clone:'g', remote:'b', stage:'g', commit:'r', branch:'p', merge:'p', log:'o', inspect:'o', undo:'r', reset:'r', danger:'r', rebase:'p', stash:'o', tags:'g', submodule:'b', bash:'o', ssh:'b', maintenance:'o', advanced:'p' };
  for (const k of Object.keys(map)) { if (t.includes(k)) return map[k]; }
  return 'b';
}

function renderAll() {
  const main = document.getElementById('main');
  let total = 0;
  main.innerHTML = sections.map((sec, si) => {
    total += sec.cmds.length;
    return `
    <div class="cmd-section" id="sec-${sec.id}" data-section="${sec.id}">
      <div class="section-header">
        <span class="section-num">${String(si+1).padStart(2,'0')}</span>
        <span class="section-title">${sec.title}</span>
        <span class="section-count">${sec.cmds.length} commands</span>
      </div>
      <div class="cmd-grid">
        ${sec.cmds.map((cmd, ci) => `
          <div class="cmd-card" data-section="${sec.id}" data-idx="${si}-${ci}" data-search="${(cmd.code+' '+cmd.desc+' '+cmd.tags.join(' ')).toLowerCase()}">
            <div class="cmd-top">
              <div class="cmd-code">${highlight(cmd.code)}</div>
              <button class="copy-btn" onclick="copyCmd(this,'${cmd.code.replace(/'/g,"\\'")}')">copy</button>
            </div>
            <div class="cmd-desc">${cmd.desc}</div>
            <div class="cmd-tags">${cmd.tags.map(t=>`<span class="tag tag-${tagClass(t)}">${t}</span>`).join('')}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('totalCount').textContent = total;
  document.getElementById('resCnt').textContent = total + ' commands';
}

function filterSection(btn, id) {
  activeSection = id;
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cmd-section').forEach(s => {
    s.classList.toggle('hidden', id !== 'all' && s.dataset.section !== id);
  });
  doSearch();
}

function doSearch() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let visible = 0;
  document.querySelectorAll('.cmd-card').forEach(card => {
    const secMatch = activeSection === 'all' || card.dataset.section === activeSection;
    const textMatch = !q || card.dataset.search.includes(q);
    const show = secMatch && textMatch;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  // Hide empty sections
  document.querySelectorAll('.cmd-section').forEach(sec => {
    if (activeSection !== 'all' && sec.dataset.section !== activeSection) return;
    const anyVisible = sec.querySelectorAll('.cmd-card:not(.hidden)').length > 0;
    sec.classList.toggle('hidden', !anyVisible);
  });
  const noR = document.getElementById('noResults');
  noR.style.display = visible === 0 ? 'block' : 'none';
  document.getElementById('resCnt').textContent = visible + ' commands';
}

function copyCmd(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('ok'); }, 1800);
  });
}

// ── Scroll ──
window.addEventListener('scroll', () => {
  const p = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
  document.getElementById('prog').style.width = (p * 100) + '%';
  const btt = document.getElementById('btt');
  window.scrollY > 400 ? btt.classList.add('show') : btt.classList.remove('show');
  // active nav
  const sections = document.querySelectorAll('.cmd-section:not(.hidden)');
  let cur = '';
  sections.forEach(s => { if (window.scrollY >= s.offsetTop - 140) cur = s.dataset.section; });
  document.querySelectorAll('.tb-btn').forEach(b => {
    const fn = b.getAttribute('onclick');
    if (!fn) return;
    const m = fn.match(/'([^']+)'\)/);
    if (m && m[1] === cur && activeSection === 'all') b.classList.add('active');
    else if (activeSection !== 'all') {}
    else b.classList.remove('active');
  });
});

renderAll();
